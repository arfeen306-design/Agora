version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: agora-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: agora
      POSTGRES_USER: agora_user
      POSTGRES_PASSWORD: agora_password
    ports:
      - "5432:5432"
    volumes:
      - agora_postgres_data:/var/lib/postgresql/data

volumes:
  agora_postgres_data:
