openapi: 3.0.3
info:
  title: Agora API
  version: 1.0.0
  description: |
    Agora School Management Platform API.
    Base contract aligned with Step 3 (auth, attendance, homework, marks, messaging, notifications).
servers:
  - url: /api/v1
    description: Relative base URL
tags:
  - name: Auth
  - name: Attendance
  - name: Homework
  - name: Marks
  - name: Messaging
  - name: Notifications
  - name: Files
  - name: Reports
  - name: Admin
  - name: Internal

paths:
  /auth/login:
    post:
      tags: [Auth]
      operationId: login
      summary: Login and issue access/refresh tokens
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '422':
          $ref: '#/components/responses/ValidationError'

  /auth/refresh:
    post:
      tags: [Auth]
      operationId: refreshToken
      summary: Refresh access token using refresh token
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshRequest'
      responses:
        '200':
          description: Token refreshed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'

  /auth/logout:
    post:
      tags: [Auth]
      operationId: logout
      summary: Revoke refresh token session
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LogoutRequest'
      responses:
        '200':
          description: Logged out
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessBooleanResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'

  /auth/me:
    get:
      tags: [Auth]
      operationId: getMe
      summary: Current authenticated user profile
      responses:
        '200':
          description: User profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MeResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'

  /attendance:
    get:
      tags: [Attendance]
      operationId: listAttendance
      summary: List attendance records
      parameters:
        - $ref: '#/components/parameters/studentIdQuery'
        - $ref: '#/components/parameters/classroomIdQuery'
        - $ref: '#/components/parameters/dateFromQuery'
        - $ref: '#/components/parameters/dateToQuery'
        - name: status
          in: query
          schema:
            $ref: '#/components/schemas/AttendanceStatus'
        - $ref: '#/components/parameters/pageQuery'
        - $ref: '#/components/parameters/pageSizeQuery'
      responses:
        '200':
          description: Attendance list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AttendanceListResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'

  /attendance/bulk:
    post:
      tags: [Attendance]
      operationId: bulkUpsertAttendance
      summary: Create/update attendance entries for a class and date
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AttendanceBulkRequest'
      responses:
        '200':
          description: Bulk attendance processed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AttendanceBulkResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '422':
          $ref: '#/components/responses/ValidationError'

  /attendance/device-ingest:
    post:
      tags: [Attendance]
      operationId: ingestAttendanceFromDevice
      summary: Ingest attendance check-in from RFID/QR/face device
      security:
        - DeviceApiKey: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AttendanceDeviceIngestRequest'
      responses:
        '200':
          description: Device attendance ingested
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AttendanceDeviceIngestResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '422':
          $ref: '#/components/responses/ValidationError'

  /attendance/{attendanceId}:
    patch:
      tags: [Attendance]
      operationId: updateAttendance
      summary: Update one attendance record
      parameters:
        - $ref: '#/components/parameters/attendanceIdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AttendanceUpdateRequest'
      responses:
        '200':
          description: Attendance record updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AttendanceRecordResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          $ref: '#/components/responses/NotFoundError'

  /homework:
    get:
      tags: [Homework]
      operationId: listHomework
      summary: List homework
      parameters:
        - $ref: '#/components/parameters/classroomIdQuery'
        - $ref: '#/components/parameters/subjectIdQuery'
        - name: due_from
          in: query
          schema:
            type: string
            format: date-time
        - name: due_to
          in: query
          schema:
            type: string
            format: date-time
        - name: published
          in: query
          schema:
            type: boolean
        - $ref: '#/components/parameters/pageQuery'
        - $ref: '#/components/parameters/pageSizeQuery'
      responses:
        '200':
          description: Homework list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HomeworkListResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
    post:
      tags: [Homework]
      operationId: createHomework
      summary: Create homework
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/HomeworkCreateRequest'
      responses:
        '201':
          description: Homework created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HomeworkResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '422':
          $ref: '#/components/responses/ValidationError'

  /homework/{homeworkId}:
    patch:
      tags: [Homework]
      operationId: updateHomework
      summary: Update homework
      parameters:
        - $ref: '#/components/parameters/homeworkIdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/HomeworkUpdateRequest'
      responses:
        '200':
          description: Homework updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HomeworkResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          $ref: '#/components/responses/NotFoundError'
    delete:
      tags: [Homework]
      operationId: deleteHomework
      summary: Delete homework (soft delete recommended)
      parameters:
        - $ref: '#/components/parameters/homeworkIdPath'
      responses:
        '200':
          description: Homework deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessBooleanResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          $ref: '#/components/responses/NotFoundError'

  /homework/{homeworkId}/submissions:
    get:
      tags: [Homework]
      operationId: listHomeworkSubmissions
      summary: List submissions for one homework
      parameters:
        - $ref: '#/components/parameters/homeworkIdPath'
        - $ref: '#/components/parameters/pageQuery'
        - $ref: '#/components/parameters/pageSizeQuery'
      responses:
        '200':
          description: Submission list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HomeworkSubmissionListResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
    post:
      tags: [Homework]
      operationId: createHomeworkSubmission
      summary: Create submission
      parameters:
        - $ref: '#/components/parameters/homeworkIdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/HomeworkSubmissionCreateRequest'
      responses:
        '201':
          description: Submission created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HomeworkSubmissionResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '422':
          $ref: '#/components/responses/ValidationError'

  /homework/submissions/{submissionId}:
    patch:
      tags: [Homework]
      operationId: updateHomeworkSubmission
      summary: Update submission status/score/feedback
      parameters:
        - $ref: '#/components/parameters/submissionIdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/HomeworkSubmissionUpdateRequest'
      responses:
        '200':
          description: Submission updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HomeworkSubmissionResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          $ref: '#/components/responses/NotFoundError'

  /assessments:
    get:
      tags: [Marks]
      operationId: listAssessments
      summary: List assessments
      parameters:
        - $ref: '#/components/parameters/classroomIdQuery'
        - $ref: '#/components/parameters/subjectIdQuery'
        - name: assessment_type
          in: query
          schema:
            type: string
        - $ref: '#/components/parameters/dateFromQuery'
        - $ref: '#/components/parameters/dateToQuery'
        - $ref: '#/components/parameters/pageQuery'
        - $ref: '#/components/parameters/pageSizeQuery'
      responses:
        '200':
          description: Assessment list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AssessmentListResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
    post:
      tags: [Marks]
      operationId: createAssessment
      summary: Create assessment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AssessmentCreateRequest'
      responses:
        '201':
          description: Assessment created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AssessmentResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '422':
          $ref: '#/components/responses/ValidationError'

  /assessments/{assessmentId}:
    patch:
      tags: [Marks]
      operationId: updateAssessment
      summary: Update assessment
      parameters:
        - $ref: '#/components/parameters/assessmentIdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AssessmentUpdateRequest'
      responses:
        '200':
          description: Assessment updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AssessmentResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          $ref: '#/components/responses/NotFoundError'

  /assessments/{assessmentId}/scores/bulk:
    post:
      tags: [Marks]
      operationId: bulkUpsertScores
      summary: Bulk create/update assessment scores
      parameters:
        - $ref: '#/components/parameters/assessmentIdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BulkScoreRequest'
      responses:
        '200':
          description: Scores processed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BulkScoreResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '422':
          $ref: '#/components/responses/ValidationError'

  /students/{studentId}/marks/summary:
    get:
      tags: [Marks]
      operationId: getStudentMarksSummary
      summary: Get student marks analytics summary
      parameters:
        - $ref: '#/components/parameters/studentIdPath'
      responses:
        '200':
          description: Marks summary
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MarksSummaryResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          $ref: '#/components/responses/NotFoundError'

  /conversations:
    get:
      tags: [Messaging]
      operationId: listConversations
      summary: List user conversations
      parameters:
        - $ref: '#/components/parameters/pageQuery'
        - $ref: '#/components/parameters/pageSizeQuery'
      responses:
        '200':
          description: Conversation list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConversationListResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
    post:
      tags: [Messaging]
      operationId: createConversation
      summary: Create conversation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ConversationCreateRequest'
      responses:
        '201':
          description: Conversation created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConversationResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '422':
          $ref: '#/components/responses/ValidationError'

  /conversations/{conversationId}/messages:
    get:
      tags: [Messaging]
      operationId: listConversationMessages
      summary: List messages in a conversation
      parameters:
        - $ref: '#/components/parameters/conversationIdPath'
        - name: cursor
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 30
      responses:
        '200':
          description: Message list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageListResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
    post:
      tags: [Messaging]
      operationId: createMessage
      summary: Send message to conversation
      parameters:
        - $ref: '#/components/parameters/conversationIdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MessageCreateRequest'
      responses:
        '201':
          description: Message created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'

  /conversations/{conversationId}/read:
    post:
      tags: [Messaging]
      operationId: markConversationRead
      summary: Mark conversation as read for current user
      parameters:
        - $ref: '#/components/parameters/conversationIdPath'
      responses:
        '200':
          description: Read state updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessBooleanResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'

  /notifications:
    get:
      tags: [Notifications]
      operationId: listNotifications
      summary: List notifications for current user
      parameters:
        - name: status
          in: query
          schema:
            $ref: '#/components/schemas/NotificationStatus'
        - name: channel
          in: query
          schema:
            $ref: '#/components/schemas/NotificationChannel'
        - $ref: '#/components/parameters/pageQuery'
        - $ref: '#/components/parameters/pageSizeQuery'
      responses:
        '200':
          description: Notification list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotificationListResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'

  /notifications/{notificationId}/read:
    patch:
      tags: [Notifications]
      operationId: markNotificationRead
      summary: Mark one notification as read
      parameters:
        - $ref: '#/components/parameters/notificationIdPath'
      responses:
        '200':
          description: Notification marked as read
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotificationResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '404':
          $ref: '#/components/responses/NotFoundError'

  /notifications/test:
    post:
      tags: [Notifications]
      operationId: sendTestNotification
      summary: Send test notification
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TestNotificationRequest'
      responses:
        '200':
          description: Notification queued/sent
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotificationResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'

  /notifications/push-tokens:
    get:
      tags: [Notifications]
      operationId: listPushTokens
      summary: List push device tokens for current user
      responses:
        '200':
          description: Push tokens list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PushTokenListResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
    post:
      tags: [Notifications]
      operationId: upsertPushToken
      summary: Register or refresh push device token for current user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PushTokenUpsertRequest'
      responses:
        '200':
          description: Push token upserted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PushTokenResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '422':
          $ref: '#/components/responses/ValidationError'

  /notifications/push-tokens/{tokenId}:
    delete:
      tags: [Notifications]
      operationId: deletePushToken
      summary: Revoke one push token for current user
      parameters:
        - name: tokenId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Push token revoked
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessBooleanResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '404':
          $ref: '#/components/responses/NotFoundError'

  /files/upload-url:
    post:
      tags: [Files]
      operationId: createSignedUploadUrl
      summary: Generate signed upload URL (and download URL for same object)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FileUploadUrlRequest'
      responses:
        '200':
          description: Signed upload URL generated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FileUploadUrlResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '422':
          $ref: '#/components/responses/ValidationError'

  /files/download-url:
    post:
      tags: [Files]
      operationId: createSignedDownloadUrl
      summary: Generate signed download URL for existing object key
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FileDownloadUrlRequest'
      responses:
        '200':
          description: Signed download URL generated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FileDownloadUrlResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '422':
          $ref: '#/components/responses/ValidationError'

  /files/local/upload/{token}:
    put:
      tags: [Files]
      operationId: localSignedUpload
      summary: Upload binary payload using local signed token (development)
      security: []
      parameters:
        - name: token
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/octet-stream:
            schema:
              type: string
              format: binary
      responses:
        '200':
          description: Local upload complete
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FileLocalUploadResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '422':
          $ref: '#/components/responses/ValidationError'

  /files/local/download/{token}:
    get:
      tags: [Files]
      operationId: localSignedDownload
      summary: Download binary payload using local signed token (development)
      security: []
      parameters:
        - name: token
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Binary file content
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '404':
          $ref: '#/components/responses/NotFoundError'

  /reports/attendance/summary:
    get:
      tags: [Reports]
      operationId: getAttendanceReportSummary
      summary: Attendance report summary
      parameters:
        - $ref: '#/components/parameters/studentIdQuery'
        - $ref: '#/components/parameters/classroomIdQuery'
        - $ref: '#/components/parameters/dateFromQuery'
        - $ref: '#/components/parameters/dateToQuery'
      responses:
        '200':
          description: Attendance summary
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AttendanceReportSummaryResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'

  /reports/homework/summary:
    get:
      tags: [Reports]
      operationId: getHomeworkReportSummary
      summary: Homework report summary
      parameters:
        - $ref: '#/components/parameters/studentIdQuery'
        - $ref: '#/components/parameters/classroomIdQuery'
        - $ref: '#/components/parameters/subjectIdQuery'
        - $ref: '#/components/parameters/dateFromQuery'
        - $ref: '#/components/parameters/dateToQuery'
      responses:
        '200':
          description: Homework summary
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HomeworkReportSummaryResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'

  /reports/marks/summary:
    get:
      tags: [Reports]
      operationId: getMarksReportSummary
      summary: Marks report summary
      parameters:
        - $ref: '#/components/parameters/studentIdQuery'
        - $ref: '#/components/parameters/classroomIdQuery'
        - $ref: '#/components/parameters/subjectIdQuery'
        - $ref: '#/components/parameters/dateFromQuery'
        - $ref: '#/components/parameters/dateToQuery'
        - name: assessment_type
          in: query
          schema:
            type: string
      responses:
        '200':
          description: Marks summary
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MarksReportSummaryResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'

  /reports/fees/summary:
    get:
      tags: [Reports]
      operationId: getFeesReportSummary
      summary: Fees report summary
      parameters:
        - $ref: '#/components/parameters/studentIdQuery'
        - $ref: '#/components/parameters/dateFromQuery'
        - $ref: '#/components/parameters/dateToQuery'
        - name: status
          in: query
          schema:
