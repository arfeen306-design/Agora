components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    DeviceApiKey:
      type: apiKey
      in: header
      name: X-Device-Api-Key
    InternalApiKey:
      type: apiKey
      in: header
      name: X-Internal-Api-Key

  parameters:
    pageQuery:
      name: page
      in: query
      schema:
        type: integer
        minimum: 1
        default: 1
    pageSizeQuery:
      name: page_size
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
    reportFormatQuery:
      name: format
      in: query
      schema:
        type: string
        enum: [csv, pdf]
        default: csv
    reportMaxRowsQuery:
      name: max_rows
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 10000
        default: 1000
    studentIdQuery:
      name: student_id
      in: query
      schema:
        type: string
        format: uuid
    classroomIdQuery:
      name: classroom_id
      in: query
      schema:
        type: string
        format: uuid
    subjectIdQuery:
      name: subject_id
      in: query
      schema:
        type: string
        format: uuid
    dateFromQuery:
      name: date_from
      in: query
      schema:
        type: string
        format: date
    dateToQuery:
      name: date_to
      in: query
      schema:
        type: string
        format: date
    attendanceIdPath:
      name: attendanceId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    homeworkIdPath:
      name: homeworkId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    submissionIdPath:
      name: submissionId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    assessmentIdPath:
      name: assessmentId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    studentIdPath:
      name: studentId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    conversationIdPath:
      name: conversationId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    notificationIdPath:
      name: notificationId
      in: path
      required: true
      schema:
        type: string
        format: uuid

  responses:
    UnauthorizedError:
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    ForbiddenError:
      description: Forbidden
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFoundError:
      description: Not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    ValidationError:
      description: Validation error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

  schemas:
    Meta:
      type: object
      properties:
        request_id:
          type: string
          format: uuid

    PagingMeta:
      type: object
      properties:
        page:
          type: integer
        page_size:
          type: integer
        total_items:
          type: integer
        total_pages:
          type: integer

    ErrorItem:
      type: object
      properties:
        field:
          type: string
        issue:
          type: string

    ErrorBody:
      type: object
      required: [code, message]
      properties:
        code:
          type: string
        message:
          type: string
        details:
          type: array
          items:
            $ref: '#/components/schemas/ErrorItem'

    ErrorResponse:
      type: object
      required: [success, error]
      properties:
        success:
          type: boolean
          example: false
        error:
          $ref: '#/components/schemas/ErrorBody'
        meta:
          $ref: '#/components/schemas/Meta'

    RoleCode:
      type: string
      enum: [school_admin, teacher, parent, student]

    AttendanceStatus:
      type: string
      enum: [present, absent, late, leave]

    AttendanceDeviceSource:
      type: string
      enum: [rfid, qr, face]

    HomeworkSubmissionStatus:
      type: string
      enum: [assigned, submitted, reviewed, missing]

    MessageKind:
      type: string
      enum: [text, file, system]

    NotificationChannel:
      type: string
      enum: [in_app, push, email, sms]

    NotificationStatus:
      type: string
      enum: [queued, sent, failed, read]

    PushProvider:
      type: string
      enum: [fcm]

    PushPlatform:
      type: string
      enum: [android, ios, web]

    User:
      type: object
      properties:
        id:
          type: string
          format: uuid
        school_id:
          type: string
          format: uuid
        first_name:
          type: string
        last_name:
          type: string
          nullable: true
        email:
          type: string
          format: email
        roles:
          type: array
          items:
            $ref: '#/components/schemas/RoleCode'

    SuccessBooleanResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        data:
          type: object
          properties:
            ok:
              type: boolean
              example: true
        meta:
          $ref: '#/components/schemas/Meta'

    LoginRequest:
      type: object
      required: [school_code, email, password]
      properties:
        school_code:
          type: string
        email:
          type: string
          format: email
        password:
          type: string
          format: password

    RefreshRequest:
      type: object
      required: [refresh_token]
      properties:
        refresh_token:
          type: string

    LogoutRequest:
      type: object
      required: [refresh_token]
      properties:
        refresh_token:
          type: string

    LoginData:
      type: object
      properties:
        access_token:
          type: string
        refresh_token:
          type: string
        expires_in:
          type: integer
        token_type:
          type: string
          example: Bearer
        user:
          $ref: '#/components/schemas/User'

    LoginResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        data:
          $ref: '#/components/schemas/LoginData'
        meta:
          $ref: '#/components/schemas/Meta'

    MeResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        data:
          $ref: '#/components/schemas/User'
        meta:
          $ref: '#/components/schemas/Meta'

    AttendanceEntry:
      type: object
      required: [student_id, status]
      properties:
        student_id:
          type: string
          format: uuid
        status:
          $ref: '#/components/schemas/AttendanceStatus'
        check_in_at:
          type: string
          format: date-time
          nullable: true
        source:
          type: string
          example: manual
        note:
          type: string
          nullable: true

    AttendanceRecord:
      type: object
      properties:
        id:
          type: string
          format: uuid
        student_id:
          type: string
          format: uuid
        classroom_id:
          type: string
          format: uuid
        attendance_date:
          type: string
          format: date
        status:
          $ref: '#/components/schemas/AttendanceStatus'
        check_in_at:
          type: string
          format: date-time
          nullable: true
        source:
          type: string
        note:
          type: string
          nullable: true

    AttendanceBulkRequest:
      type: object
      required: [classroom_id, attendance_date, entries]
      properties:
        classroom_id:
          type: string
          format: uuid
        attendance_date:
          type: string
          format: date
        entries:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/AttendanceEntry'

    AttendanceBulkResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        data:
          type: object
          properties:
            created_count:
              type: integer
            updated_count:
              type: integer
        meta:
          $ref: '#/components/schemas/Meta'

    AttendanceDeviceIngestRequest:
      type: object
      required: [school_code, source]
      properties:
        school_code:
          type: string
          example: agora_demo
        student_id:
          type: string
          format: uuid
        student_code:
          type: string
          example: STD-001
        classroom_id:
          type: string
          format: uuid
        source:
          $ref: '#/components/schemas/AttendanceDeviceSource'
        scanner_id:
          type: string
          example: gate-a
        scanned_at:
          type: string
          format: date-time
        note:
          type: string
      oneOf:
        - required: [student_id]
        - required: [student_code]

    AttendanceDeviceIngestData:
      type: object
      properties:
        operation:
          type: string
          enum: [created, updated]
        attendance:
          $ref: '#/components/schemas/AttendanceRecord'
        derived:
          type: object
          properties:
            school_timezone:
              type: string
            late_after_local_time:
              type: string
            is_late:
              type: boolean
        notifications_queued:
          type: integer
        student:
          type: object
          properties:
            id:
              type: string
              format: uuid
            student_code:
              type: string
            first_name:
              type: string
            last_name:
              type: string
              nullable: true

    AttendanceDeviceIngestResponse:
      type: object
      properties:
        success:
          type: boolean
        data:
          $ref: '#/components/schemas/AttendanceDeviceIngestData'
        meta:
          $ref: '#/components/schemas/Meta'

    AttendanceUpdateRequest:
      type: object
      properties:
        status:
          $ref: '#/components/schemas/AttendanceStatus'
        check_in_at:
          type: string
          format: date-time
        source:
          type: string
        note:
          type: string

    AttendanceRecordResponse:
      type: object
      properties:
        success:
          type: boolean
        data:
          $ref: '#/components/schemas/AttendanceRecord'
        meta:
          $ref: '#/components/schemas/Meta'

    AttendanceListResponse:
      type: object
      properties:
        success:
          type: boolean
        data:
          type: array
          items:
            $ref: '#/components/schemas/AttendanceRecord'
        meta:
          allOf:
            - $ref: '#/components/schemas/Meta'
            - type: object
              properties:
                pagination:
                  $ref: '#/components/schemas/PagingMeta'

    Homework:
      type: object
      properties:
        id:
          type: string
          format: uuid
        classroom_id:
          type: string
          format: uuid
        subject_id:
          type: string
          format: uuid
          nullable: true
        title:
          type: string
        description:
          type: string
          nullable: true
        due_at:
          type: string
          format: date-time
          nullable: true
        attachment_urls:
          type: array
          items:
            type: string
            format: uri
        is_published:
          type: boolean

    HomeworkCreateRequest:
      type: object
      required: [classroom_id, title]
      properties:
        classroom_id:
          type: string
          format: uuid
        subject_id:
          type: string
          format: uuid
        title:
          type: string
        description:
          type: string
        due_at:
          type: string
          format: date-time
        attachment_urls:
          type: array
          items:
            type: string
            format: uri
        is_published:
          type: boolean
          default: true

    HomeworkUpdateRequest:
      type: object
      properties:
        title:
          type: string
        description:
          type: string
        due_at:
          type: string
          format: date-time
        attachment_urls:
          type: array
          items:
            type: string
            format: uri
        is_published:
          type: boolean

    HomeworkResponse:
      type: object
      properties:
        success:
          type: boolean
        data:
          $ref: '#/components/schemas/Homework'
        meta:
          $ref: '#/components/schemas/Meta'

    HomeworkListResponse:
      type: object
      properties:
        success:
          type: boolean
        data:
          type: array
          items:
            $ref: '#/components/schemas/Homework'
        meta:
          allOf:
            - $ref: '#/components/schemas/Meta'
            - type: object
              properties:
                pagination:
                  $ref: '#/components/schemas/PagingMeta'

    HomeworkSubmission:
      type: object
      properties:
        id:
          type: string
          format: uuid
        homework_id:
          type: string
          format: uuid
        student_id:
          type: string
          format: uuid
        status:
          $ref: '#/components/schemas/HomeworkSubmissionStatus'
        submitted_at:
          type: string
          format: date-time
          nullable: true
        graded_at:
          type: string
          format: date-time
          nullable: true
        score:
          type: number
          nullable: true
        feedback:
          type: string
          nullable: true
        attachment_urls:
          type: array
          items:
            type: string
            format: uri

    HomeworkSubmissionCreateRequest:
      type: object
      required: [student_id, status]
      properties:
        student_id:
          type: string
          format: uuid
        status:
          $ref: '#/components/schemas/HomeworkSubmissionStatus'
        attachment_urls:
          type: array
          items:
            type: string
            format: uri

    HomeworkSubmissionUpdateRequest:
      type: object
      properties:
        status:
          $ref: '#/components/schemas/HomeworkSubmissionStatus'
        score:
          type: number
          minimum: 0
          maximum: 100
        feedback:
          type: string
        graded_at:
          type: string
          format: date-time

    HomeworkSubmissionResponse:
      type: object
      properties:
        success:
          type: boolean
        data:
          $ref: '#/components/schemas/HomeworkSubmission'
        meta:
          $ref: '#/components/schemas/Meta'

    HomeworkSubmissionListResponse:
      type: object
      properties:
        success:
          type: boolean
        data:
          type: array
          items:
            $ref: '#/components/schemas/HomeworkSubmission'
        meta:
          allOf:
            - $ref: '#/components/schemas/Meta'
            - type: object
              properties:
                pagination:
                  $ref: '#/components/schemas/PagingMeta'

    Assessment:
      type: object
      properties:
        id:
          type: string
          format: uuid
        classroom_id:
          type: string
          format: uuid
        subject_id:
          type: string
          format: uuid
          nullable: true
        title:
          type: string
        assessment_type:
          type: string
        max_marks:
          type: number
        assessment_date:
          type: string
          format: date
          nullable: true

    AssessmentCreateRequest:
      type: object
      required: [classroom_id, title, assessment_type, max_marks]
      properties:
        classroom_id:
          type: string
          format: uuid
        subject_id:
          type: string
          format: uuid
        title:
          type: string
        assessment_type:
          type: string
        max_marks:
          type: number
          minimum: 0.01
        assessment_date:
          type: string
          format: date

    AssessmentUpdateRequest:
      type: object
      properties:
        title:
          type: string
        assessment_type:
          type: string
        max_marks:
          type: number
          minimum: 0.01
        assessment_date:
          type: string
          format: date

    AssessmentResponse:
      type: object
      properties:
        success:
          type: boolean
        data:
          $ref: '#/components/schemas/Assessment'
        meta:
          $ref: '#/components/schemas/Meta'

    AssessmentListResponse:
      type: object
      properties:
        success:
          type: boolean
        data:
          type: array
          items:
            $ref: '#/components/schemas/Assessment'
        meta:
          allOf:
            - $ref: '#/components/schemas/Meta'
            - type: object
              properties:
                pagination:
                  $ref: '#/components/schemas/PagingMeta'

    ScoreItem:
      type: object
      required: [student_id, marks_obtained]
      properties:
        student_id:
          type: string
          format: uuid
        marks_obtained:
          type: number
          minimum: 0
        remarks:
          type: string
          nullable: true

    BulkScoreRequest:
      type: object
      required: [scores]
      properties:
        scores:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/ScoreItem'

    BulkScoreResponse:
      type: object
      properties:
        success:
          type: boolean
        data:
          type: object
          properties:
            created_count:
              type: integer
            updated_count:
              type: integer
        meta:
          $ref: '#/components/schemas/Meta'

    SubjectAverage:
      type: object
      properties:
        subject_id:
          type: string
          format: uuid
        subject_name:
          type: string
        average:
          type: number

    TrendPoint:
      type: object
      properties:
        label:
          type: string
        average:
          type: number

    MarksSummary:
      type: object
      properties:
        student_id:
          type: string
          format: uuid
        overall_average:
          type: number
        subject_averages:
          type: array
          items:
            $ref: '#/components/schemas/SubjectAverage'
        trend:
          type: array
          items:
            $ref: '#/components/schemas/TrendPoint'

    MarksSummaryResponse:
      type: object
      properties:
        success:
          type: boolean
        data:
          $ref: '#/components/schemas/MarksSummary'
        meta:
          $ref: '#/components/schemas/Meta'

    Conversation:
      type: object
      properties:
        id:
          type: string
          format: uuid
        kind:
          type: string
          enum: [direct, group, broadcast]
        title:
          type: string
          nullable: true
        unread_count:
          type: integer
        last_message_preview:
          type: string
          nullable: true

    ConversationCreateRequest:
      type: object
      required: [kind, participant_user_ids]
      properties:
        kind:
          type: string
          enum: [direct, group, broadcast]
        title:
          type: string
          nullable: true
        participant_user_ids:
          type: array
          minItems: 1
