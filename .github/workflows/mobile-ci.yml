name: Agora Mobile CI

on:
  push:
    paths:
      - "agora-mobile/**"
      - ".github/workflows/mobile-ci.yml"
  pull_request:
    paths:
      - "agora-mobile/**"
      - ".github/workflows/mobile-ci.yml"

jobs:
  mobile-checks:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
        working-directory: agora-mobile

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: "3.27.4"
          cache: true

      - name: Flutter pub get
        run: flutter pub get

      - name: Flutter analyze
        run: flutter analyze

      - name: Flutter test
        run: flutter test
