name: DR Backup Restore Drill

on:
  workflow_dispatch:
  schedule:
    - cron: "0 2 * * 0"

jobs:
  backup-restore-drill:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 12

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install PostgreSQL client
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client

      - name: Prepare drill source database
        env:
          PGPASSWORD: postgres
        run: |
          psql -h 127.0.0.1 -U postgres -d postgres -v ON_ERROR_STOP=1 <<'SQL'
          DO $$
          BEGIN
            IF NOT EXISTS (SELECT 1 FROM pg_roles WHERE rolname = 'agora_user') THEN
              CREATE ROLE agora_user WITH LOGIN PASSWORD 'change_me' SUPERUSER;
            ELSE
              ALTER ROLE agora_user WITH LOGIN PASSWORD 'change_me' SUPERUSER;
            END IF;
          END $$;

          SELECT pg_terminate_backend(pid)
          FROM pg_stat_activity
          WHERE datname = 'agora'
            AND pid <> pg_backend_pid();

          DROP DATABASE IF EXISTS agora;
          CREATE DATABASE agora OWNER agora_user;
          SQL

      - name: Apply schema and seed
        env:
          PGPASSWORD: change_me
        run: |
          psql -h 127.0.0.1 -U agora_user -d agora -v ON_ERROR_STOP=1 -f database/agora_schema.sql
          psql -h 127.0.0.1 -U agora_user -d agora -v ON_ERROR_STOP=1 -f database/dev_seed.sql

      - name: Run backup + restore drill
        env:
          DB_HOST: 127.0.0.1
          DB_PORT: 5432
          DB_NAME: agora
          DB_USER: agora_user
          DB_PASSWORD: change_me
          BACKUP_DIR: /tmp/agora-backups
        run: |
          bash database/scripts/backup_restore_drill.sh

      - name: Upload drill backup artifact
        uses: actions/upload-artifact@v4
        with:
          name: agora-drill-backup
          path: /tmp/agora-backups/*.dump
          if-no-files-found: error
